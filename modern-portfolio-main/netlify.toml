[build]
  command = "npm run build"
  publish = ".next"
  ignore = "git diff HEAD^ HEAD --name-only | grep -qEv '(\\.md$|LICENSE$|\\.env\\.example$|^\\.github/|^\\.vscode/)' && exit 1 || exit 0"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[dev]
  command = "next dev"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
